<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maalata - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }

        .badge {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .demo-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .demo-section h2 {
            color: #00ccff;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        #canvas {
            width: 100%;
            max-width: 800px;
            height: 400px;
            border: 2px solid #00ff88;
            border-radius: 4px;
            display: block;
            margin-bottom: 20px;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Maalata Demo <span class="badge">CRT + Latency Pipeline</span></h1>
        <p class="subtitle">2002-era retro experience: CRT post-processing, 168ms click-to-photon latency, 8 FPS rendering</p>

        <div class="demo-section">
            <h2>Renderer Output</h2>
            <canvas id="canvas" width="800" height="400"></canvas>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
