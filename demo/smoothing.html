<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maalata - Smoothing Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }

        .badge {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .canvas-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .canvas-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            flex: 1;
        }

        .canvas-section h2 {
            color: #00ccff;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        canvas {
            width: 100%;
            max-width: 400px;
            height: 400px;
            border: 2px solid #00ff88;
            border-radius: 4px;
            display: block;
            background: #000;
        }

        .canvas-section-full {
            flex: 1 1 100%;
        }

        #canvas-xbrz {
            max-width: 800px;
            height: 800px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Maalata Smoothing <span class="badge">hq4x + RGSS</span></h1>
        <p class="subtitle">1:1 pixel art smoothing — draw at native resolution, get anti-aliased edges automatically</p>

        <div class="canvas-row">
            <div class="canvas-section">
                <h2>Raw (no smoothing)</h2>
                <canvas id="canvas-raw" width="400" height="400"></canvas>
            </div>
            <div class="canvas-section">
                <h2>Smoothed (hq4x)</h2>
                <canvas id="canvas-smooth" width="400" height="400"></canvas>
            </div>
        </div>

        <div class="canvas-row">
            <div class="canvas-section canvas-section-full">
                <h2>xBRZ Freescale only (2× upscale, no downsample)</h2>
                <canvas id="canvas-xbrz" width="800" height="800"></canvas>
            </div>
        </div>
    </div>

    <script type="module" src="/src/smoothing.ts"></script>
</body>
</html>
